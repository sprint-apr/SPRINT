- failing_tests: Unit tests that fail due to the bug.
- err_logs: Error messages from the failing tests.

Step 2: Collect relevant patch ingredients, including:

- Local variables and method parameters
- Constants and literals
- Methods and class members accessible in the context
- Expressions or conditions found elsewhere in the method
- Prefer semantically rich elements such as annotations, type metadata, or structural relationships

Step 3: Fill the <MASK> with meaningful Java code. Follow these guidelines:

- Use the identifiers valid in the current context.
- Avoid redundant or ineffective logic (e.g., `if (b && b)`).
- You may reuse logic found elsewhere in the method.

Step 4: Format Patch Candidates:

- Return exactly n patch candidates.
- Enclose each in a <patch_code> block.
- Present patches in order of increasing complexity, from simplest to most complex.
"""

